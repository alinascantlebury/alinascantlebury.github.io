<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karate Club Network</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            
        }

        .tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.75);
            color: #fff;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 13px;
            pointer-events: none;
            opacity: 0;
        }
    </style>
</head>
<a href="../index.html">← Back</a>

<body>

<div id="chart-container"></div>
<div class="tooltip" id="tooltip"></div>

<script>
const width = 1200;
const height = 900;

const svg = d3.select("#chart-container")
    .append("svg")
    .attr("width", width)
    .attr("height", height);

const tooltip = d3.select("#tooltip");

d3.csv("karate.csv").then(function(data) {

    const links = data.map(d => ({
        source: d.source,
        target: d.target
    }));

    const nodes = Array.from(
        new Set(data.flatMap(d => [d.source, d.target]))
    ).map(id => ({ id }));

    const degree = {};
    links.forEach(l => {
        degree[l.source] = (degree[l.source] || 0) + 1;
        degree[l.target] = (degree[l.target] || 0) + 1;
    });

    const color = d3.scaleQuantize()
    .domain([0, d3.max(Object.values(degree))])
    .range([
    "#a6cee3",
"#1f78b4",
"#b2df8a",
"#33a02c",
"#fb9a99"
    ]);

    const simulation = d3.forceSimulation(nodes)
        .force("link", d3.forceLink(links).id(d => d.id).distance(60))
        .force("charge", d3.forceManyBody().strength(-200))
        .force("center", d3.forceCenter(width / 2, height / 2))
        .force("collision", d3.forceCollide().radius(10));

    const link = svg.append("g")
        .attr("stroke", "#aaa")
        .attr("stroke-opacity", 0.6)
        .selectAll("line")
        .data(links)
        .join("line");

    const node = svg.append("g")
        .selectAll("circle")
        .data(nodes)
        .join("circle")
        .attr("r", d => 4 + (degree[d.id] || 1)) // size by degree
        .attr("fill", d => color(degree[d.id] || 1))
        .call(d3.drag()
            .on("start", dragstarted)
            .on("drag", dragged)
            .on("end", dragended)
        );

    node
        .on("mouseover", (event, d) => {
            tooltip
                .html(`Node: ${d.id}<br>Connections: ${degree[d.id] || 0}`)
                .style("opacity", 1);
        })
        .on("mousemove", (event) => {
            tooltip
                .style("left", (event.pageX + 10) + "px")
                .style("top", (event.pageY - 20) + "px");
        })
        .on("mouseleave", () => {
            tooltip.style("opacity", 0);
        });

    simulation.on("tick", () => {
        link
            .attr("x1", d => d.source.x)
            .attr("y1", d => d.source.y)
            .attr("x2", d => d.target.x)
            .attr("y2", d => d.target.y);

        node
            .attr("cx", d => d.x)
            .attr("cy", d => d.y);
    });

    function dragstarted(event) {
        if (!event.active) simulation.alphaTarget(0.3).restart();
        event.subject.fx = event.subject.x;
        event.subject.fy = event.subject.y;
    }

    function dragged(event) {
        event.subject.fx = event.x;
        event.subject.fy = event.y;
    }

    function dragended(event) {
        if (!event.active) simulation.alphaTarget(0);
        event.subject.fx = null;
        event.subject.fy = null;
    }

    svg.append("text")
        .attr("x", width / 2)
        .attr("y", 30)
        .attr("text-anchor", "middle")
        .style("font-size", "20px")
        .style("font-weight", "bold")
        .text("Karate Club Network (Zachary, 1977)");
});
</script>

</body>
</html>
