<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Choropleth</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3-legend/2.25.6/d3-legend.min.js"></script> <!-- map source: https://github.com/topojson/topojson -->
    <!-- map wouldnt work so used Promise.all:https://developer.mozilla.org/en-US/docs/Web/JavaScript/Reference/Global_Objects/Promise/all -->
<!-- choropleth map structure adapted from: https://observablehq.com/@d3/choropleth -->
    <style>
        body {
            position: relative;
            display: flex;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        #chart-container {
            width: 100%;
            max-width: 1200px;
        }
        .tooltip {
            position: absolute;

            background: rgba(0,0,0,0.75);
            color: #fff;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 13px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s ease;
        }
        .title { font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>
    <a href="../index.html">← Back</a>

    <div id="chart-container"></div>
    <div class="tooltip" id="tooltip"></div>

    <script>
const svgWidth  = 1200;
const svgHeight = 700;
const margin    = { top: 60, right: 220, bottom: 60, left: 100 };
        const width     = svgWidth  - margin.left - margin.right;
        const height    = svgHeight - margin.top  - margin.bottom;

        const svg = d3.select("#chart-container")
            .append("svg")
            .attr("width", svgWidth)
            .attr("height", svgHeight)
            .attr("viewBox", [0, 0, svgWidth, svgHeight])
            .attr("style", "max-width: 100%; height: auto;");

        const tooltip = d3.select("#tooltip");
        Promise.all([
            d3.csv("poverty.csv"),
            d3.json("https://cdn.jsdelivr.net/npm/us-atlas@3/counties-albers-10m.json")
        ]).then(function([data, us]) {

            console.log("CSV rows:", data.length);
            console.log("Sample:", data[0]);

            data.forEach(function(d) {
                d.id   = String(d.FIPS_Code).padStart(5, "0");
                d.rate = +d.Value;
            });

            const valuemap = new Map(
                data
                    .filter(d => d.Attribute.trim() === "PCTPOVALL_2023")
                    .map(d => [d.id, d.rate])
            );


            const color    = d3.scaleQuantize([0, 40], d3.schemeOranges[9]);
            const path     = d3.geoPath();
            const counties = topojson.feature(us, us.objects.counties);
            const states   = topojson.feature(us, us.objects.states);
            const statemap = new Map(states.features.map(d => [d.id, d]));

            svg.append("g")
                .attr("transform", `translate(${(svgWidth - width) / 2}, ${margin.top})`)
                .selectAll("path")
                .data(counties.features)
                .join("path")
                .attr("fill", d => color(valuemap.get(d.id)) ?? "#ccc")
                .attr("d", path)
                .on("mouseover", (event, d) => {
                    const val = valuemap.get(d.id) ?? "N/A";
                    const stateFeature = statemap.get(d.id.slice(0, 2));
                    const stateName = stateFeature ? stateFeature.properties.name : "";
                    tooltip
                    .html(`<strong>${d.properties.name}, ${stateName}</strong><br>Poverty: ${(+val).toFixed(1)}%`)
                        .style("opacity", 1);
                })
                .on("mousemove", (event) => {
                    tooltip
                        .style("left", (event.pageX + 12) + "px")
                        .style("top",  (event.pageY - 28) + "px");
                })
                .on("mouseleave", () => tooltip.style("opacity", 0));

            svg.append("path")
                .attr("transform", `translate(${margin.left}, ${margin.top})`)
                .datum(topojson.mesh(us, us.objects.states, (a, b) => a !== b))
                .attr("fill", "none")
                .attr("stroke", "white")
                .attr("stroke-width", 1)
                .attr("stroke-linejoin", "round")
                .attr("d", path);

            svg.append("text")
                .attr("x", svgWidth / 2)
                .attr("y", 35)
                .attr("text-anchor", "middle")
                .attr("class", "title")
                .text("U.S. County Poverty Rate 2023 — Choropleth Map");

            const scaleColor = d3.scaleSequential(d3.interpolateOranges).domain([0, 40]);

            svg.append("g")
                .attr("class", "legendColor")
                .attr("transform", `translate(${svgWidth - 150}, 280)`);

            svg.select(".legendColor").call(
                d3.legendColor()
                    .scale(scaleColor)
                    .title("Poverty Rate (%)")
            );

        }).catch(function(err) {
            console.error("LOAD ERROR:", err);
        });
    </script>
</body>
</html>
