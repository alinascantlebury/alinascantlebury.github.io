<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Proportional Symbols Map</title>
    <!-- used D3 + Leaflet + Tooltips from edstem-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
    <style>
        body { margin: 0; }
        #map { height: 100vh; }
        .d3-overlay { position: absolute; top: 0; left: 0; pointer-events: none; overflow: visible; }
        circle { pointer-events: all; cursor: pointer; }
        #tooltip {
            position: absolute;
            background: white;
            border: 1px solid #ccc;
            border-radius: 6px;
            padding: 8px 12px;
            font: 14px sans-serif;
            pointer-events: none;
            display: none;
            z-index: 1000;
        }
        #tooltip strong { display: block; margin-bottom: 4px; font-size: 15px; }
        #tooltip span { color: #555; font-size: 12px; }
        #legend {
            position: absolute;
            bottom: 30px;
            right: 20px;
            background: white;
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 12px 16px;
            font: 13px sans-serif;
            z-index: 1000;
            min-width: 180px;
        }
        #legend h4 { margin: 0 0 8px; font-size: 13px; }
        .legend-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
        .legend-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
    </style>
</head>
<body>
<div id="map"></div>
<div id="tooltip"><strong></strong><span></span></div>
<div id="legend">
    <h4>Housing Cost Index</h4>
    <div class="legend-row"><div class="legend-dot" style="background:#fdc086;opacity:0.7"></div><span>Top 10 most expensive</span></div>
    <div class="legend-row"><div class="legend-dot" style="background:#beaed4;opacity:0.7"></div><span>All other states</span></div>
    <hr style="margin:8px 0">
    <h4>Transportation Cost Index</h4>
    <svg width="180" height="80">
        <circle cx="20"  cy="60" r="8"  fill="none" stroke="#999" stroke-width="1"/>
        <circle cx="55"  cy="55" r="13" fill="none" stroke="#999" stroke-width="1"/>
        <circle cx="95"  cy="48" r="20" fill="none" stroke="#999" stroke-width="1"/>
        <circle cx="145" cy="40" r="28" fill="none" stroke="#999" stroke-width="1"/>
        <text x="20"  y="75" text-anchor="middle" font-size="10" fill="#555">80</text>
        <text x="55"  y="75" text-anchor="middle" font-size="10" fill="#555">100</text>
        <text x="95"  y="75" text-anchor="middle" font-size="10" fill="#555">120</text>
        <text x="145" y="75" text-anchor="middle" font-size="10" fill="#555">140</text>
    </svg>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script>
    
    const map = L.map('map').setView([38, -97], 4);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {

    }).addTo(map);

    const svg     = d3.select(map.getPanes().overlayPane).append('svg').attr('class', 'd3-overlay');
    const g       = svg.append('g').attr('class', 'leaflet-zoom-hide');
    const tooltip = document.getElementById('tooltip');

    d3.csv("Expensive-States.csv").then(function(data) {

        data.forEach(function(d) {
            d.lat          = +d.latitude;
            d.lng          = +d.longitude;
            d.housingCost  = +d.housingCost;
            d.costIndex    = +d.costIndex;
            d.groceryCost  = +d.groceryCost;
            d.utilitiesCost = +d.utilitiesCost;
            d.transportationCost = +d.transportationCost;
            d.costRank     = +d.costRank;
        });

        const r = d3.scaleSqrt()
            .domain([0, d3.max(data, d => d.housingCost)])
            .range([0, 35]);

        const circles = g.selectAll('circle')
            .data(data)
            .join('circle')
            .attr('r',            d => r(d.housingCost))
            .attr('fill',         d => d.costRank <= 10 ? '#fdc086' : '#beaed4')
            .attr('fill-opacity', 0.45)
            .attr('stroke',       d => d.costRank <= 10 ? '#fdc086' : '#beaed4')
            .attr('stroke-width', 1.5)
            .on('mouseover', function(event, d) {
                d3.select(this).attr('fill-opacity', 0.75);
                tooltip.style.display = 'block';
                tooltip.querySelector('strong').textContent = d.State;
                tooltip.querySelector('span').innerHTML =
                    `Transportation: ${d.transportationCost}`;
            })
            .on('mousemove', function(event) {
                tooltip.style.left = (event.pageX + 15) + 'px';
                tooltip.style.top  = (event.pageY - 28) + 'px';
            })
            .on('mouseout', function() {
                d3.select(this).attr('fill-opacity', 0.45);
                tooltip.style.display = 'none';
            });

        function update() {
            const tl = map.latLngToLayerPoint(map.getBounds().getNorthWest());
            const br = map.latLngToLayerPoint(map.getBounds().getSouthEast());
            svg.style('left', tl.x + 'px').style('top', tl.y + 'px')
               .attr('width',  br.x - tl.x)
               .attr('height', br.y - tl.y);
            g.attr('transform', `translate(${-tl.x},${-tl.y})`);
            circles
                .attr('cx', d => map.latLngToLayerPoint([d.lat, d.lng]).x)
                .attr('cy', d => map.latLngToLayerPoint([d.lat, d.lng]).y);
        }

        update();
        map.on('moveend', update);
        map.on('zoomend', update);
    });
</script>
</body>
</html>
